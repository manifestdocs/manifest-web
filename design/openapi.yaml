openapi: 3.1.0
info:
  title: Manifest API
  description: |
    Living feature documentation server for AI-assisted development.

    Manifest tracks **features** (system capabilities) rather than work items.
    Features are living descriptions that evolve with the codebase, organized in a
    hierarchical tree structure under projects.

    ## Core Concepts

    - **Project**: Groups features, directories, and git remotes for a codebase
    - **Feature**: A capability of the system, organized hierarchically
    - **History**: Append-only log of work completed on features
  version: 0.1.0
  license:
    name: MIT
  contact:
    name: Manifest

servers:
  - url: http://localhost:17010/api/v1
    description: Local development server

tags:
  - name: Projects
    description: Project management - groups features and directories
  - name: Directories
    description: Project directory management
  - name: Versions
    description: Version management for release planning
  - name: Features
    description: Feature tree management
  - name: History
    description: Feature implementation history
  - name: Filesystem
    description: Local filesystem browsing for directory selection
  - name: Health
    description: Server health checks
  - name: Portfolio
    description: Multi-project dashboard — aggregated health snapshots for all projects

paths:
  /portfolio:
    get:
      tags: [Portfolio]
      summary: Get portfolio snapshot
      description: |
        Returns an aggregated health snapshot for all projects in a single call.
        Designed for the Portfolio View — shows next version progress, next proposed
        feature, in-progress features (capped at 5), blocked features, and recent
        completions (last 7 days) for each project.
      operationId: getPortfolio
      responses:
        '200':
          description: Portfolio snapshot for all projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'

  /portfolio/events:
    get:
      tags: [Portfolio]
      summary: Subscribe to portfolio change events (SSE)
      description: |
        Server-sent event stream that fires a `change` event whenever any feature
        in any project is modified. The client should re-fetch `GET /portfolio` on
        each event. No payload is included — the data endpoint does the work.

        Reuses the same global broadcast channel as the per-project SSE streams.
        One connection covers all projects regardless of how many exist.
      operationId: subscribePortfolio
      responses:
        '200':
          description: SSE stream of portfolio change events
          content:
            text/event-stream:
              schema:
                type: string

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  # ============================================================
  # Filesystem
  # ============================================================
  /filesystem/browse:
    get:
      tags: [Filesystem]
      summary: Browse directories
      description: |
        Lists subdirectories at a given path for building a directory browser UI.
        Skips hidden directories and common noise directories (node_modules, target, etc.).
        Defaults to the user's home directory if no path is provided.
        Only available on the local self-hosted server.
      operationId: browseFilesystem
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: Absolute path to browse. Defaults to user's home directory.
          example: '/Users/dev/projects'
      responses:
        '200':
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowseResponse'
        '400':
          description: Invalid path (not absolute or not a directory)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied (path restricted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Directory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /filesystem/mkdir:
    post:
      tags: [Filesystem]
      summary: Create a directory
      description: |
        Creates a directory at the specified path, including intermediate
        directories. Idempotent — succeeds if the directory already exists.
        Safety guarantees:
        - Path must be absolute
        - Path must not contain '..' components
        - Subject to the same path restrictions as browsing
      operationId: createDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MkdirRequest'
      responses:
        '200':
          description: Directory created (or already existed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MkdirResponse'
        '400':
          description: Invalid path (not absolute or contains '..')
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied (path restricted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # Projects
  # ============================================================
  /projects:
    get:
      tags: [Projects]
      summary: List all projects
      operationId: listProjects
      responses:
        '200':
          description: List of projects ordered by name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      summary: Create a new project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectInput'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/by-directory:
    get:
      tags: [Projects]
      summary: Find project by directory path
      description: |
        Given a directory path, finds the project that contains it.
        Matches if the path equals or is a subdirectory of any project directory.
        Useful for MCP clients to discover project context from the current working directory.
      operationId: getProjectByDirectory
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute directory path to look up
          example: '/Users/dev/projects/my-app/src'
      responses:
        '200':
          description: Project with directories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithDirectories'
        '404':
          description: No project found for the given directory
          content:
            text/plain:
              schema:
                type: string
                example: 'No project found for directory: /Users/dev/unknown'

  /projects/by-slug/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Project slug (URL-friendly identifier)
        example: 'manifest'
    get:
      tags: [Projects]
      summary: Get a project by slug
      operationId: getProjectBySlug
      responses:
        '200':
          description: Project with directories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithDirectories'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Get a project with its directories
      operationId: getProject
      responses:
        '200':
          description: Project with directories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithDirectories'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Projects]
      summary: Update a project
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectInput'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: Delete a project
      description: Deletes the project and cascades to all features, sessions, and tasks
      operationId: deleteProject
      responses:
        '204':
          description: Project deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}/focus:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Get focused feature for project
      description: Returns the currently focused feature for the project (used by MCP agents to know what the user is looking at).
      operationId: getProjectFocus
      responses:
        '200':
          description: Focused feature info
          content:
            application/json:
              schema:
                type: object
                required: [feature_id, feature_title, feature_state]
                properties:
                  feature_id:
                    type: string
                    format: uuid
                  feature_title:
                    type: string
                  feature_state:
                    type: string
        '404':
          description: No feature is focused
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    put:
      tags: [Projects]
      summary: Set or clear focused feature for project
      operationId: setProjectFocus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feature_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Feature ID to focus on, or null to clear focus.
      responses:
        '204':
          description: Focus updated

  /projects/{id}/history:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [History]
      summary: Get project-wide history
      description: |
        Returns history entries across all features in the project, ordered by
        creation date (newest first). Each entry includes feature and version context.
        Useful for PMs to see recent changes across the entire project.
        Filter by version_id to see all work done for a specific release.
      operationId: getProjectHistory
      parameters:
        - name: version_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter to entries for a specific version (useful for release notes).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 50
          description: Maximum number of entries to return. Defaults to 50.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of entries to skip for pagination. Defaults to 0.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only return entries created after this ISO datetime.
      responses:
        '200':
          description: History entries with feature and version context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectHistoryEntry'

  /projects/{id}/directories:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Directories]
      summary: List project directories
      operationId: listProjectDirectories
      responses:
        '200':
          description: List of directories (primary first, then by path)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectDirectory'
    post:
      tags: [Directories]
      summary: Add a directory to a project
      operationId: addProjectDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDirectoryInput'
      responses:
        '201':
          description: Directory added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDirectory'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{id}/versions:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Versions]
      summary: List versions for a project
      operationId: listProjectVersions
      responses:
        '200':
          description: List of versions ordered by creation date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Version'
    post:
      tags: [Versions]
      summary: Create a new version
      operationId: createVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersionInput'
      responses:
        '201':
          description: Version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /versions/{id}:
    parameters:
      - $ref: '#/components/parameters/VersionId'
    get:
      tags: [Versions]
      summary: Get a version by ID
      operationId: getVersion
      responses:
        '200':
          description: The version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Versions]
      summary: Update a version
      operationId: updateVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVersionInput'
      responses:
        '200':
          description: Version updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Versions]
      summary: Delete a version
      operationId: deleteVersion
      responses:
        '204':
          description: Version deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}/features:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: List all features in a project
      description: |
        Returns feature summaries ordered by priority then title.
        Always returns summaries only - use GET /features/{id} for full details.
      operationId: listProjectFeatures
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Feature summaries in the project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'
    post:
      tags: [Features]
      summary: Create a feature in a project
      operationId: createFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeatureInput'
      responses:
        '201':
          description: Feature created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{id}/features/bulk:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Features]
      summary: Bulk create features with hierarchical structure
      description: |
        Create multiple features at once, supporting hierarchical relationships.
        Use this to set up an entire feature tree in one operation.

        When `confirm=false` (default), returns the proposed features without creating them.
        This allows reviewing the structure before committing.

        When `confirm=true`, creates all features and returns their IDs.
        Children are created after their parents, maintaining the tree structure.
      operationId: bulkCreateFeatures
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateFeaturesInput'
      responses:
        '200':
          description: Proposed or created features
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanFeaturesResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{id}/features/roots:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: List root features (no parent) in a project
      operationId: listRootFeatures
      responses:
        '200':
          description: Root features ordered by title
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Feature'

  /projects/{id}/features/tree:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: Get complete feature tree
      description: |
        Returns all features in a hierarchical tree structure with children
        recursively nested. Useful for visualizing the full project structure.
      operationId: getFeatureTree
      responses:
        '200':
          description: Feature tree with nested children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureTreeNode'

  # ============================================================
  # Directories (standalone)
  # ============================================================
  /directories/{id}:
    parameters:
      - $ref: '#/components/parameters/DirectoryId'
    delete:
      tags: [Directories]
      summary: Remove a directory
      operationId: removeProjectDirectory
      responses:
        '204':
          description: Directory removed
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Features (standalone)
  # ============================================================
  /features:
    get:
      tags: [Features]
      summary: List all features across all projects
      description: |
        Returns feature summaries ordered by priority then title.
        Always returns summaries only - use GET /features/{id} for full details.
      operationId: listFeatures
      parameters:
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Feature summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'

  /features/search:
    get:
      tags: [Features]
      summary: Search features by title or content
      description: |
        Search features by matching against title and details.
        Returns summaries ranked by relevance (title matches first).
        Use GET /features/{id} for full details of a specific result.
      operationId: searchFeatures
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search term to match against title and details
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional project UUID to limit search to
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Maximum number of results to return. Defaults to 10.
      responses:
        '200':
          description: Feature summaries matching the search query, ranked by relevance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'

  /features/{id}:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Get a feature by ID
      operationId: getFeature
      responses:
        '200':
          description: The feature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Features]
      summary: Update a feature
      operationId: updateFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeatureInput'
      responses:
        '200':
          description: Feature updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Features]
      summary: Delete a feature
      description: Deletes the feature and cascades to all children
      operationId: deleteFeature
      responses:
        '204':
          description: Feature deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/children:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: List direct children of a feature
      operationId: listChildren
      responses:
        '200':
          description: Direct children ordered by title
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Feature'

  /features/{id}/history:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [History]
      summary: Get feature history
      description: Returns the implementation history log (like git log)
      operationId: getFeatureHistory
      responses:
        '200':
          description: History entries in reverse chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureHistory'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [History]
      summary: Add a history entry to a feature
      description: |
        Records work completed on a feature. Each entry captures a summary of changes
        and optionally links to git commits. Use this when completing work on a feature.
      operationId: addFeatureHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddHistoryInput'
      responses:
        '201':
          description: History entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureHistory'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /features/{id}/diff:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Get feature diff
      description: |
        Returns the diff between current details and desired details.
        Use this to see what changes are pending before implementation.
      operationId: getFeatureDiff
      responses:
        '200':
          description: Diff between current and desired state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureDiff'
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/blockers:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Get feature blockers
      description: |
        Returns the features that are blocking this feature.
        Only returns results for features in the 'blocked' state.
      operationId: getFeatureBlockers
      responses:
        '200':
          description: List of blocking features
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project UUID

    DirectoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Directory UUID

    FeatureId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Feature UUID

    VersionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Version UUID

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Maximum number of items to return.

    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of items to skip for pagination.

  responses:
    NotFound:
      description: Resource not found
      content:
        text/plain:
          schema:
            type: string
            example: 'Project not found'

    InternalError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string

  schemas:
    # ============================================================
    # Project schemas
    # ============================================================
    Project:
      type: object
      required: [id, slug, name, key_prefix, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: URL-friendly identifier (lowercase, hyphenated). Unique across all projects.
          example: 'manifest'
        key_prefix:
          type: string
          description: Uppercase prefix for human-friendly feature IDs (e.g., "MAN" produces MAN-1, MAN-2). Auto-derived from slug, max 5 chars.
          example: 'MAN'
        name:
          type: string
          example: 'Manifest'
        description:
          type: string
          nullable: true
          example: 'Living feature documentation server'
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents (coding guidelines, conventions, etc.)
          example: 'Use Result<T,E> for errors. Follow coding-guidelines.md.'
        current_version_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the current/active version for this project
        default_feature_destination:
          type: string
          enum: [backlog, now]
          default: backlog
          description: Where new features go by default. "backlog" leaves them unassigned, "now" assigns to the current version.
        detail_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for feature sets and project context.
        ac_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for leaf feature specifications.
        ac_format:
          type: string
          enum: [checkbox, gherkin]
          default: checkbox
          description: Output format for acceptance criteria.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: 'My Project'
        slug:
          type: string
          nullable: true
          description: URL-friendly identifier. If not provided, auto-generated from name.
          example: 'my-project'
        key_prefix:
          type: string
          nullable: true
          description: Uppercase prefix for feature display IDs (max 5 chars). Auto-derived from slug if not provided.
          example: 'MYPRJ'
        description:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents

    UpdateProjectInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
          description: URL-friendly identifier. Must be unique.
          example: 'my-project'
        key_prefix:
          type: string
          description: Uppercase prefix for feature display IDs (max 5 chars).
          example: 'MYPRJ'
        description:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents
        current_version_id:
          type: string
          format: uuid
          nullable: true
          description: Set the current/active version for this project
        default_feature_destination:
          type: string
          enum: [backlog, now]
          description: Where new features go by default. "backlog" leaves them unassigned, "now" assigns to the current version.
        detail_level:
          type: string
          enum: [concise, standard, thorough]
          description: How detailed guidance should be for feature sets and project context.
        ac_level:
          type: string
          enum: [concise, standard, thorough]
          description: How detailed guidance should be for leaf feature specifications.
        ac_format:
          type: string
          enum: [checkbox, gherkin]
          description: Output format for acceptance criteria.

    ProjectDirectory:
      type: object
      required: [id, project_id, path, is_primary, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        path:
          type: string
          example: '/Users/dev/projects/my-project'
        git_remote:
          type: string
          nullable: true
          example: 'git@github.com:org/repo.git'
        is_primary:
          type: boolean
          default: false
        instructions:
          type: string
          nullable: true
          description: Directory-specific instructions for AI agents (build commands, test commands, etc.)
          example: 'Run tests with: cargo test. Build with: cargo build --release'
        created_at:
          type: string
          format: date-time

    AddDirectoryInput:
      type: object
      required: [path]
      properties:
        path:
          type: string
          example: '/Users/dev/projects/my-project'
        git_remote:
          type: string
          nullable: true
        is_primary:
          type: boolean
          default: false
        instructions:
          type: string
          nullable: true
          description: Directory-specific instructions for AI agents

    ProjectWithDirectories:
      type: object
      required: [id, slug, name, created_at, updated_at, directories]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: URL-friendly identifier
        name:
          type: string
        description:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents
        current_version_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the current/active version for this project
        default_feature_destination:
          type: string
          enum: [backlog, now]
          default: backlog
          description: Where new features go by default. "backlog" leaves them unassigned, "now" assigns to the current version.
        detail_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for feature sets and project context.
        ac_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for leaf feature specifications.
        ac_format:
          type: string
          enum: [checkbox, gherkin]
          default: checkbox
          description: Output format for acceptance criteria.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        directories:
          type: array
          items:
            $ref: '#/components/schemas/ProjectDirectory'

    # ============================================================
    # Feature schemas
    # ============================================================
    Feature:
      type: object
      required: [id, project_id, title, state, priority, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent feature ID (null for root features)
        title:
          type: string
          example: 'User Authentication'
        details:
          type: string
          nullable: true
          description: Current feature specification (what the feature IS)
        desired_details:
          type: string
          nullable: true
          description: Desired feature specification (what the feature SHOULD be). Non-null indicates pending changes.
        state:
          $ref: '#/components/schemas/FeatureState'
        priority:
          type: integer
          default: 0
          description: Priority for ordering within parent (lower values first)
        feature_number:
          type: integer
          nullable: true
          description: Per-project sequential number for display IDs (e.g., 42 in MAN-42). Assigned at creation time.
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version ID for release planning
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FeatureState:
      type: string
      enum: [proposed, blocked, in_progress, implemented, archived]
      description: |
        - proposed: Initial state, in backlog
        - blocked: Cannot proceed until blocker features are implemented
        - in_progress: Actively being worked on
        - implemented: Feature is live in codebase
        - archived: Feature archived (soft-deleted)

    FeatureSummary:
      type: object
      description: Lightweight feature summary without details (used for list operations)
      required: [id, project_id, title, state, priority]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent feature ID (null for root features)
        title:
          type: string
          example: 'User Authentication'
        state:
          $ref: '#/components/schemas/FeatureState'
        priority:
          type: integer
          default: 0
          description: Priority for ordering within parent (lower values first)
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version ID for release planning

    CreateFeatureInput:
      type: object
      required: [title]
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        details:
          type: string
          nullable: true
          description: Feature specification including user stories, implementation notes, and technical context
        state:
          $ref: '#/components/schemas/FeatureState'
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version for release planning

    UpdateFeatureInput:
      type: object
      properties:
        title:
          type: string
        details:
          type: string
          nullable: true
          description: Current feature specification (what the feature IS)
        desired_details:
          type: string
          nullable: true
          description: Desired feature specification (what the feature SHOULD be). Set to plan pending changes.
        state:
          $ref: '#/components/schemas/FeatureState'
        priority:
          type: integer
          description: Priority for ordering within parent
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version for release planning
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Move feature under a different parent. Set null to make root-level.
        blocked_by:
          type: array
          items:
            type: string
            format: uuid
          description: Feature IDs that block this feature. Required when transitioning to 'blocked' state. The feature auto-transitions to 'proposed' when all blockers reach 'implemented'.

    BulkCreateFeaturesInput:
      type: object
      required: [features]
      description: Input for bulk feature creation with hierarchical structure
      properties:
        features:
          type: array
          description: The proposed feature tree to create
          items:
            $ref: '#/components/schemas/ProposedFeature'
        confirm:
          type: boolean
          default: false
          description: |
            If true, creates the features in the database.
            If false (default), returns the proposal for review without creating anything.

    ProposedFeature:
      type: object
      required: [title]
      description: A feature proposal for bulk creation, supporting hierarchical structure
      properties:
        title:
          type: string
          description: Short capability name (2-5 words). What users can DO.
          example: 'User Authentication'
        details:
          type: string
          nullable: true
          description: |
            Feature details including user stories, implementation notes, and technical context.
            User stories can use "As a [user], I can [capability] so that [benefit]" format.
        priority:
          type: integer
          default: 0
          description: Priority for ordering. Lower values = implement first.
        children:
          type: array
          default: []
          description: Child features (for hierarchical structure)
          items:
            $ref: '#/components/schemas/ProposedFeature'

    PlanFeaturesResponse:
      type: object
      required: [proposed_features, created]
      description: Response from bulk feature creation
      properties:
        proposed_features:
          type: array
          description: The proposed feature tree (same as input, for review)
          items:
            $ref: '#/components/schemas/ProposedFeature'
        created:
          type: boolean
          description: Whether the features were created (true if confirm=true was passed)
        created_feature_ids:
          type: array
          default: []
          description: UUIDs of created features (only populated if created=true)
          items:
            type: string
            format: uuid

    FeatureTreeNode:
      type: object
      description: A feature with its children recursively nested
      allOf:
        - $ref: '#/components/schemas/Feature'
        - type: object
          required: [children]
          properties:
            children:
              type: array
              items:
                $ref: '#/components/schemas/FeatureTreeNode'
            is_root:
              type: boolean
              default: false
              description: True if this is the project's root feature (contains project instructions)

    FeatureHistory:
      type: object
      required: [id, feature_id, summary, created_at]
      description: |
        Append-only log entry recording work completed on a feature.
        Similar to git log - records implementation history, not version snapshots.
      properties:
        id:
          type: string
          format: uuid
        feature_id:
          type: string
          format: uuid
        version_id:
          type: string
          format: uuid
          nullable: true
          description: Version this work was done for (captured at time of completion)
        summary:
          type: string
          description: Summary of work completed
        commits:
          type: array
          description: Git commits created during this work
          items:
            $ref: '#/components/schemas/CommitRef'
        created_at:
          type: string
          format: date-time

    ProjectHistoryEntry:
      type: object
      required:
        [id, feature_id, feature_title, feature_state, summary, created_at]
      description: |
        Project-wide history entry with feature context. Used for the unified
        project history view, where PMs can see recent changes across all features.
      properties:
        id:
          type: string
          format: uuid
        feature_id:
          type: string
          format: uuid
        feature_title:
          type: string
          description: Feature title, denormalized for display
        feature_state:
          $ref: '#/components/schemas/FeatureState'
          description: Feature state at time of query
        version_id:
          type: string
          format: uuid
          nullable: true
          description: Version this work was done for
        version_name:
          type: string
          nullable: true
          description: Version name, denormalized for display
        summary:
          type: string
          description: Summary of work completed
        commits:
          type: array
          description: Git commits created during this work
          items:
            $ref: '#/components/schemas/CommitRef'
        created_at:
          type: string
          format: date-time

    FeatureDiff:
      type: object
      required: [has_changes]
      description: |
        Diff between current and desired feature details.
        Use this to see pending changes before implementation.
      properties:
        has_changes:
          type: boolean
          description: Whether there are pending changes (desired_details differs from details)
        current:
          type: string
          nullable: true
          description: Current details (what the feature IS)
        desired:
          type: string
          nullable: true
          description: Desired details (what the feature SHOULD be)

    # ============================================================
    # History schemas
    # ============================================================
    AddHistoryInput:
      type: object
      required: [summary]
      description: Input for adding a history entry to a feature
      properties:
        summary:
          type: string
          description: Summary of work completed
        commits:
          type: array
          description: Git commits created during this work
          items:
            $ref: '#/components/schemas/CommitRef'
        version_id:
          type: string
          format: uuid
          nullable: true
          description: Version this work was done for (defaults to feature's target_version_id if not specified)

    CommitRef:
      type: object
      required: [sha, message]
      description: Reference to a git commit
      properties:
        sha:
          type: string
          description: Commit SHA (short or full)
          example: 'abc123f'
        message:
          type: string
          description: Commit message (first line)
          example: 'Add OAuth login flow'
        author:
          type: string
          nullable: true
          description: Commit author (if different from default)

    # ============================================================
    # Version schemas
    # ============================================================
    Version:
      type: object
      required: [id, project_id, name, created_at, updated_at]
      description: A version for release planning
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
          description: Version name (e.g., "1.0.0", "2.0.0-beta")
          example: '1.0.0'
        description:
          type: string
          nullable: true
          description: Optional description of the version
        released_at:
          type: string
          format: date-time
          nullable: true
          description: When this version was released (if released)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateVersionInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Version name (e.g., "1.0.0", "2.0.0-beta")
        description:
          type: string
          nullable: true
          description: Optional description of the version

    UpdateVersionInput:
      type: object
      properties:
        name:
          type: string
          description: Version name
        description:
          type: string
          nullable: true
          description: Optional description of the version
        released_at:
          type: string
          format: date-time
          nullable: true
          description: Set to mark the version as released

    # ============================================================
    # Filesystem schemas
    # ============================================================
    BrowseResponse:
      type: object
      required: [path, entries]
      description: Directory listing for the filesystem browser
      properties:
        path:
          type: string
          description: The absolute path being browsed
          example: '/Users/dev/projects'
        parent:
          type: string
          nullable: true
          description: Parent directory path, or null if at filesystem root
          example: '/Users/dev'
        entries:
          type: array
          description: Subdirectories at this path
          items:
            $ref: '#/components/schemas/DirectoryEntry'

    DirectoryEntry:
      type: object
      required: [name, path, has_children]
      description: A subdirectory entry in the filesystem browser
      properties:
        name:
          type: string
          description: Directory name
          example: 'my-project'
        path:
          type: string
          description: Full absolute path
          example: '/Users/dev/projects/my-project'
        has_children:
          type: boolean
          description: Whether this directory contains visible subdirectories

    MkdirRequest:
      type: object
      required: [path]
      description: Request to create a directory
      properties:
        path:
          type: string
          description: Absolute path of the directory to create
          example: '/Users/dev/projects/my-new-app'

    MkdirResponse:
      type: object
      required: [path]
      description: Result of creating a directory
      properties:
        path:
          type: string
          description: The absolute path that was created
          example: '/Users/dev/projects/my-new-app'

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message
          example: 'Path must be absolute'

    # ============================================================
    # Portfolio schemas
    # ============================================================

    PortfolioFeatureRef:
      type: object
      required: [id, title]
      description: A minimal feature reference used in portfolio lanes.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string

    PortfolioVersionSummary:
      type: object
      required: [id, name, feature_count, implemented_count]
      description: Version progress summary for the portfolio lane header.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: 'v0.2.0'
        feature_count:
          type: integer
          description: Total leaf features assigned to this version.
        implemented_count:
          type: integer
          description: Leaf features in this version with state `implemented`.

    PortfolioNextFeature:
      type: object
      required: [id, title, in_version]
      description: The single next actionable feature for a project.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        in_version:
          type: boolean
          description: Whether this feature is assigned to the next version (vs backlog).

    PortfolioCompletion:
      type: object
      required: [id, title, completed_at]
      description: A recent feature completion for the activity section.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        completed_at:
          type: string
          format: date-time

    PortfolioProject:
      type: object
      required: [id, name, slug, in_progress, in_progress_total, blocked, blocked_count, recent_completions]
      description: Aggregated health snapshot for a single project in the portfolio view.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        next_version:
          $ref: '#/components/schemas/PortfolioVersionSummary'
          nullable: true
        next_feature:
          $ref: '#/components/schemas/PortfolioNextFeature'
          nullable: true
        in_progress:
          type: array
          description: Up to 5 in-progress leaf features.
          items:
            $ref: '#/components/schemas/PortfolioFeatureRef'
        in_progress_total:
          type: integer
          description: Total count of in-progress leaf features (may exceed in_progress.length).
        blocked:
          type: array
          description: All blocked leaf features.
          items:
            $ref: '#/components/schemas/PortfolioFeatureRef'
        blocked_count:
          type: integer
          description: Total count of blocked leaf features.
        recent_completions:
          type: array
          description: Up to 5 features completed in the last 7 days, newest-first.
          items:
            $ref: '#/components/schemas/PortfolioCompletion'
        last_activity_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent completion (for stalled detection).

    Portfolio:
      type: object
      required: [projects]
      description: Full portfolio response — health snapshots for all projects.
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioProject'
