openapi: 3.1.0
info:
  title: Manifest API
  description: |
    Living feature documentation server for AI-assisted development.

    Manifest tracks **features** (system capabilities) rather than work items.
    Features are living descriptions that evolve with the codebase, organized in a
    hierarchical tree structure under projects.

    ## Core Concepts

    - **Project**: Groups features, directories, and git remotes for a codebase
    - **Feature**: A capability of the system, organized hierarchically
    - **History**: Append-only log of work completed on features
  version: 0.1.0
  license:
    name: MIT
  contact:
    name: Manifest

servers:
  - url: http://localhost:17010/api/v1
    description: Local development server

tags:
  - name: Projects
    description: Project management - groups features and directories
  - name: Directories
    description: Project directory management
  - name: Versions
    description: Version management for release planning
  - name: Features
    description: Feature tree management
  - name: History
    description: Feature implementation history
  - name: Filesystem
    description: Local filesystem browsing for directory selection
  - name: Health
    description: Server health checks
  - name: Portfolio
    description: Multi-project dashboard — aggregated health snapshots for all projects
  - name: Verification
    description: Feature implementation verification
  - name: Memories
    description: Project memory storage for AI agents
  - name: Settings
    description: Server configuration management
  - name: Analysis
    description: Codebase analysis for project discovery

paths:
  /portfolio:
    get:
      tags: [Portfolio]
      summary: Get portfolio snapshot
      description: |
        Returns an aggregated health snapshot for all projects in a single call.
        Designed for the Portfolio View — shows next version progress, next proposed
        feature, in-progress features (capped at 5), blocked features, and recent
        completions (last 7 days) for each project.
      operationId: getPortfolio
      responses:
        '200':
          description: Portfolio snapshot for all projects
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Portfolio'

  /portfolio/events:
    get:
      tags: [Portfolio]
      summary: Subscribe to portfolio change events (SSE)
      description: |
        Server-sent event stream that fires a `change` event whenever any feature
        in any project is modified. The client should re-fetch `GET /portfolio` on
        each event. No payload is included — the data endpoint does the work.

        Reuses the same global broadcast channel as the per-project SSE streams.
        One connection covers all projects regardless of how many exist.
      operationId: subscribePortfolio
      responses:
        '200':
          description: SSE stream of portfolio change events
          content:
            text/event-stream:
              schema:
                type: string

  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: health
      responses:
        '200':
          description: Server is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok

  /version:
    get:
      tags: [Health]
      summary: Get server version
      operationId: getVersion
      responses:
        '200':
          description: Server version information
          content:
            application/json:
              schema:
                type: object
                required: [version, releases_url]
                properties:
                  version:
                    type: string
                    example: '1.0.0'
                  releases_url:
                    type: string
                    example: 'https://api.github.com/repos/manifestdocs/manifest/releases/latest'

  # ============================================================
  # Filesystem
  # ============================================================
  /filesystem/browse:
    get:
      tags: [Filesystem]
      summary: Browse directories
      description: |
        Lists subdirectories at a given path for building a directory browser UI.
        Skips hidden directories and common noise directories (node_modules, target, etc.).
        Defaults to the user's home directory if no path is provided.
        Only available on the local self-hosted server.
      operationId: browseFilesystem
      parameters:
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: Absolute path to browse. Defaults to user's home directory.
          example: '/Users/dev/projects'
      responses:
        '200':
          description: Directory listing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowseResponse'
        '400':
          description: Invalid path (not absolute or not a directory)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied (path restricted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Directory not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /filesystem/mkdir:
    post:
      tags: [Filesystem]
      summary: Create a directory
      description: |
        Creates a directory at the specified path, including intermediate
        directories. Idempotent — succeeds if the directory already exists.
        Safety guarantees:
        - Path must be absolute
        - Path must not contain '..' components
        - Subject to the same path restrictions as browsing
      operationId: createDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MkdirRequest'
      responses:
        '200':
          description: Directory created (or already existed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MkdirResponse'
        '400':
          description: Invalid path (not absolute or contains '..')
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Access denied (path restricted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ============================================================
  # Analysis
  # ============================================================
  /codebase/analyze:
    get:
      tags: [Analysis]
      summary: Analyze a codebase directory
      description: |
        Discovers project structure including language, frameworks, modules, and documentation.
        Used by AI agents before planning features to understand what capabilities exist.
      operationId: analyzeProject
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute path to the directory to analyze.
        - name: include_docs
          in: query
          required: false
          schema:
            type: boolean
            default: true
          description: Include documentation content (README, CLAUDE.md).
        - name: max_depth
          in: query
          required: false
          schema:
            type: integer
            default: 3
          description: Maximum directory depth to scan.
      responses:
        '200':
          description: Project analysis results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectAnalysis'
        '400':
          description: Invalid path
        '403':
          description: Access denied
        '404':
          description: Directory not found

  # ============================================================
  # Projects
  # ============================================================
  /projects:
    get:
      tags: [Projects]
      summary: List all projects
      operationId: listProjects
      responses:
        '200':
          description: List of projects ordered by name
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Project'
    post:
      tags: [Projects]
      summary: Create a new project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectInput'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/by-directory:
    get:
      tags: [Projects]
      summary: Find project by directory path
      description: |
        Given a directory path, finds the project that contains it.
        Matches if the path equals or is a subdirectory of any project directory.
        Useful for MCP clients to discover project context from the current working directory.
      operationId: getProjectByDirectory
      parameters:
        - name: path
          in: query
          required: true
          schema:
            type: string
          description: Absolute directory path to look up
          example: '/Users/dev/projects/my-app/src'
      responses:
        '200':
          description: Project with directories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithDirectories'
        '404':
          description: No project found for the given directory
          content:
            text/plain:
              schema:
                type: string
                example: 'No project found for directory: /Users/dev/unknown'

  /projects/by-slug/{slug}:
    parameters:
      - name: slug
        in: path
        required: true
        schema:
          type: string
        description: Project slug (URL-friendly identifier)
        example: 'manifest'
    get:
      tags: [Projects]
      summary: Get a project by slug
      operationId: getProjectBySlug
      responses:
        '200':
          description: Project with directories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithDirectories'
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Get a project with its directories
      operationId: getProject
      responses:
        '200':
          description: Project with directories
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectWithDirectories'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Projects]
      summary: Update a project
      operationId: updateProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProjectInput'
      responses:
        '200':
          description: Project updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Projects]
      summary: Delete a project
      description: Deletes the project and cascades to all features, sessions, and tasks
      operationId: deleteProject
      responses:
        '204':
          description: Project deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}/focus:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Projects]
      summary: Get focused feature for project
      description: Returns the currently focused feature for the project (used by MCP agents to know what the user is looking at).
      operationId: getProjectFocus
      responses:
        '200':
          description: Focused feature info
          content:
            application/json:
              schema:
                type: object
                required: [feature_id, feature_title, feature_state]
                properties:
                  feature_id:
                    type: string
                    format: uuid
                  feature_title:
                    type: string
                  feature_state:
                    type: string
        '404':
          description: No feature is focused
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
    put:
      tags: [Projects]
      summary: Set or clear focused feature for project
      operationId: setProjectFocus
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feature_id:
                  type: string
                  format: uuid
                  nullable: true
                  description: Feature ID to focus on, or null to clear focus.
      responses:
        '204':
          description: Focus updated

  /projects/{id}/history:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [History]
      summary: Get project-wide history
      description: |
        Returns history entries across all features in the project, ordered by
        creation date (newest first). Each entry includes feature and version context.
        Useful for PMs to see recent changes across the entire project.
        Filter by version_id to see all work done for a specific release.
      operationId: getProjectHistory
      parameters:
        - name: version_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter to entries for a specific version (useful for release notes).
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 50
          description: Maximum number of entries to return. Defaults to 50.
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Number of entries to skip for pagination. Defaults to 0.
        - name: since
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Only return entries created after this ISO datetime.
      responses:
        '200':
          description: History entries with feature and version context
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectHistoryEntry'

  /projects/{id}/directories:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Directories]
      summary: List project directories
      operationId: listProjectDirectories
      responses:
        '200':
          description: List of directories (primary first, then by path)
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectDirectory'
    post:
      tags: [Directories]
      summary: Add a directory to a project
      operationId: addProjectDirectory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddDirectoryInput'
      responses:
        '201':
          description: Directory added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectDirectory'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{id}/versions:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Versions]
      summary: List versions for a project
      operationId: listProjectVersions
      responses:
        '200':
          description: List of versions ordered by creation date
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Version'
    post:
      tags: [Versions]
      summary: Create a new version
      operationId: createVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateVersionInput'
      responses:
        '201':
          description: Version created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /versions/{id}:
    parameters:
      - $ref: '#/components/parameters/VersionId'
    get:
      tags: [Versions]
      summary: Get a version by ID
      operationId: getVersion
      responses:
        '200':
          description: The version
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Versions]
      summary: Update a version
      operationId: updateVersion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateVersionInput'
      responses:
        '200':
          description: Version updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Versions]
      summary: Delete a version
      operationId: deleteVersion
      responses:
        '204':
          description: Version deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /projects/{id}/features:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: List all features in a project
      description: |
        Returns feature summaries ordered by priority then title.
        Always returns summaries only - use GET /features/{id} for full details.
      operationId: listProjectFeatures
      parameters:
        - name: version_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter features by target version assignment.
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Feature summaries in the project
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'
    post:
      tags: [Features]
      summary: Create a feature in a project
      operationId: createFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFeatureInput'
      responses:
        '201':
          description: Feature created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{id}/features/bulk:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    post:
      tags: [Features]
      summary: Bulk create features with hierarchical structure
      description: |
        Create multiple features at once, supporting hierarchical relationships.
        Use this to set up an entire feature tree in one operation.

        When `confirm=false` (default), returns the proposed features without creating them.
        This allows reviewing the structure before committing.

        When `confirm=true`, creates all features and returns their IDs.
        Children are created after their parents, maintaining the tree structure.
      operationId: bulkCreateFeatures
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkCreateFeaturesInput'
      responses:
        '200':
          description: Proposed or created features
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlanFeaturesResponse'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /projects/{id}/features/roots:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: List root features (no parent) in a project
      operationId: listRootFeatures
      responses:
        '200':
          description: Root features ordered by title
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Feature'

  /projects/{id}/features/tree:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: Get complete feature tree
      description: |
        Returns all features in a hierarchical tree structure with children
        recursively nested. Useful for visualizing the full project structure.
      operationId: getFeatureTree
      responses:
        '200':
          description: Feature tree with nested children
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureTreeNode'

  /projects/{id}/features/next:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: Get the next workable feature
      description: |
        Returns the single highest-priority feature that is workable (proposed or in_progress).
        Sort order: version > priority > created_at.
        Features targeting the "next" version (first unreleased) come first,
        then features with no version (backlog).
      operationId: getNextFeature
      parameters:
        - name: version_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional version ID to filter features.
      responses:
        '200':
          description: The next workable feature with context, or null if none found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureWithContext'
                nullable: true

  /projects/{id}/subscribe:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Features]
      summary: Subscribe to feature change events (SSE)
      description: |
        Server-sent event stream that fires whenever a feature in this project is modified.
        Events include `change` (generic modification) and `feature_completed` (with JSON payload).
      operationId: subscribeProjectFeatures
      responses:
        '200':
          description: SSE stream of feature change events
          content:
            text/event-stream:
              schema:
                type: string

  # ============================================================
  # Directories (standalone)
  # ============================================================
  /directories/{id}:
    parameters:
      - $ref: '#/components/parameters/DirectoryId'
    delete:
      tags: [Directories]
      summary: Remove a directory
      operationId: removeProjectDirectory
      responses:
        '204':
          description: Directory removed
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Features (standalone)
  # ============================================================
  /features:
    get:
      tags: [Features]
      summary: List all features across all projects
      description: |
        Returns feature summaries ordered by priority then title.
        Always returns summaries only - use GET /features/{id} for full details.
      operationId: listFeatures
      parameters:
        - name: version_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter features by target version assignment.
        - $ref: '#/components/parameters/Limit'
        - $ref: '#/components/parameters/Offset'
      responses:
        '200':
          description: Feature summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'

  /features/search:
    get:
      tags: [Features]
      summary: Search features by title or content
      description: |
        Search features by matching against title and details.
        Returns summaries ranked by relevance (title matches first).
        Use GET /features/{id} for full details of a specific result.
      operationId: searchFeatures
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Search term to match against title and details
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional project UUID to limit search to
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 10
          description: Maximum number of results to return. Defaults to 10.
      responses:
        '200':
          description: Feature summaries matching the search query, ranked by relevance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'

  /features/resolve:
    get:
      tags: [Features]
      summary: Resolve a feature by UUID, display ID, or prefix
      description: |
        Resolves a feature from a UUID, display ID (e.g. "MAN-42"), or UUID prefix.
        Returns the matching feature if exactly one match is found.
      operationId: resolveFeature
      parameters:
        - name: prefix
          in: query
          required: true
          schema:
            type: string
          description: 'ID to resolve: UUID, display ID like "MAN-42", or UUID prefix.'
        - name: project_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Optional project UUID to scope the search to.
      responses:
        '200':
          description: The resolved feature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '404':
          description: No feature found matching the prefix

  /features/{id}:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Get a feature by ID
      operationId: getFeature
      responses:
        '200':
          description: The feature
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      tags: [Features]
      summary: Update a feature
      operationId: updateFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateFeatureInput'
      responses:
        '200':
          description: Feature updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Features]
      summary: Delete a feature
      description: Deletes the feature and cascades to all children
      operationId: deleteFeature
      responses:
        '204':
          description: Feature deleted
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/children:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: List direct children of a feature
      operationId: listChildren
      responses:
        '200':
          description: Direct children ordered by title
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Feature'

  /features/{id}/context:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Get a feature with hierarchical context
      description: |
        Returns the feature with navigation context: parent, siblings, children, and
        breadcrumb trail from root. Used by AI agents to understand where a feature
        sits in the tree.
      operationId: getFeatureWithContext
      responses:
        '200':
          description: Feature with hierarchical context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureWithContext'
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/history:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [History]
      summary: Get feature history
      description: Returns the implementation history log (like git log)
      operationId: getFeatureHistory
      responses:
        '200':
          description: History entries in reverse chronological order
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureHistory'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags: [History]
      summary: Add a history entry to a feature
      description: |
        Records work completed on a feature. Each entry captures a summary of changes
        and optionally links to git commits. Use this when completing work on a feature.
      operationId: addFeatureHistory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddHistoryInput'
      responses:
        '201':
          description: History entry created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureHistory'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalError'

  /features/{id}/verify:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    post:
      tags: [Verification]
      summary: Get verification context
      description: |
        Assembles the feature spec + breadcrumb context and optionally filters a provided diff.
        Returns structured context for an AI agent to analyze — no LLM call server-side.
      operationId: getVerifyContext
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                diff:
                  type: string
                  nullable: true
                  description: Optional git diff to include in the verification context.
      responses:
        '200':
          description: Assembled verification context
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerifyFeatureContextResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/verification:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    put:
      tags: [Verification]
      summary: Record verification results
      description: |
        Stores agent-generated verification comments on the feature record.
        Overwrites any previous verification result. Pass an empty comments array
        if the implementation fully satisfies the spec.
      operationId: recordFeatureVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [comments]
              properties:
                comments:
                  type: array
                  items:
                    $ref: '#/components/schemas/VerificationComment'
      responses:
        '200':
          description: Feature with updated verification
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Feature'
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/diff:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Get feature diff
      description: |
        Returns the diff between current details and desired details.
        Use this to see what changes are pending before implementation.
      operationId: getFeatureDiff
      responses:
        '200':
          description: Diff between current and desired state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FeatureDiff'
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/blockers:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Get feature blockers
      description: |
        Returns the features that are blocking this feature.
        Only returns results for features in the 'blocked' state.
      operationId: getFeatureBlockers
      responses:
        '200':
          description: List of blocking features
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FeatureSummary'
        '404':
          $ref: '#/components/responses/NotFound'

  /features/{id}/blocked-ancestor:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Features]
      summary: Find blocked ancestor in parent chain
      description: |
        Walks up the parent chain to find the first blocked ancestor feature set.
        Returns null if no blocked ancestor is found.
      operationId: findBlockedAncestor
      responses:
        '200':
          description: Blocked ancestor if found, or null
          content:
            application/json:
              schema:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  title:
                    type: string

  /features/{id}/claim:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    put:
      tags: [Features]
      summary: Atomically claim a feature
      description: |
        Atomically transitions a feature to in_progress and sets claim fields
        (agent_type, claimed_at, claim_metadata) in a single transaction.

        Uses BEGIN IMMEDIATE on SQLite to prevent race conditions when two agents
        try to claim the same feature simultaneously. Exactly one succeeds; the
        other receives a 409 Conflict with details about the existing claim.
      operationId: claimFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimFeatureInput'
      responses:
        '200':
          description: Feature claimed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                    example: true
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Feature already claimed by another agent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClaimConflictError'

  /features/{id}/complete:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    post:
      tags: [Features]
      summary: Complete a feature
      description: |
        Records a history entry with the work summary and commit references,
        transitions the feature to 'implemented', and clears any active claims.
      operationId: completeFeature
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteFeatureInput'
      responses:
        '201':
          description: Feature completed with history entry
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompleteFeatureResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Proofs
  # ============================================================
  /features/{id}/proofs:
    parameters:
      - $ref: '#/components/parameters/FeatureId'
    get:
      tags: [Proofs]
      summary: List proofs for a feature
      description: Returns all proofs for a feature, ordered by most recent first.
      operationId: listProofsForFeature
      responses:
        '200':
          description: List of proofs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Proof'

  /proofs/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Proof ID
    get:
      tags: [Proofs]
      summary: Get a proof by ID
      operationId: getProof
      responses:
        '200':
          description: The proof
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Proof'
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Memories
  # ============================================================
  /projects/{id}/memories:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      tags: [Memories]
      summary: Search or list project memories
      operationId: listMemories
      parameters:
        - name: q
          in: query
          required: false
          schema:
            type: string
          description: Search query (full-text on SQLite, LIKE fallback on PostgreSQL). Omit to list all.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 10
            maximum: 100
          description: Maximum results to return.
      responses:
        '200':
          description: List of project memories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ProjectMemory'
    post:
      tags: [Memories]
      summary: Create a project memory
      operationId: createMemory
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMemoryInput'
      responses:
        '201':
          description: Memory created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProjectMemory'

  /projects/{id}/memories/{memory_id}:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - name: memory_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Memory UUID
    delete:
      tags: [Memories]
      summary: Delete a project memory
      operationId: deleteMemory
      responses:
        '204':
          description: Memory deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # ============================================================
  # Settings
  # ============================================================
  /settings:
    get:
      tags: [Settings]
      summary: Get server settings
      operationId: getSettings
      responses:
        '200':
          description: Current server configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  database_path:
                    type: string
                    nullable: true
                  database_path_resolved:
                    type: string
                  config_file:
                    type: string
                  default_agent:
                    type: string
                    example: 'claude'
    put:
      tags: [Settings]
      summary: Update server settings
      description: |
        Updates server configuration. If the database path changes, triggers a server restart.
      operationId: updateSettings
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                database_path:
                  type: string
                  nullable: true
                  description: Path to the SQLite database file. Null resets to default.
                default_agent:
                  type: string
                  nullable: true
                  description: "Default agent type. Allowed: claude, gemini, copilot, codex."
      responses:
        '200':
          description: Settings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  database_path:
                    type: string
                    nullable: true
                  database_path_resolved:
                    type: string
                  config_file:
                    type: string
                  default_agent:
                    type: string
                  restart_required:
                    type: boolean

  /settings/mcp-status:
    get:
      tags: [Settings]
      summary: Check MCP configuration status
      description: Checks if the default agent has an MCP server configured.
      operationId: checkMcpStatus
      responses:
        '200':
          description: MCP configuration status
          content:
            application/json:
              schema:
                type: object
                properties:
                  agent:
                    type: string
                  configured:
                    type: boolean
                  config_file:
                    type: string
                  setup_hint:
                    type: string

  /settings/configure-mcp:
    post:
      tags: [Settings]
      summary: Auto-configure MCP for the default agent
      operationId: configureMcp
      responses:
        '200':
          description: MCP configured successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  config_file:
                    type: string
        '400':
          description: Agent not supported for auto-configuration

components:
  parameters:
    ProjectId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Project UUID

    DirectoryId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Directory UUID

    FeatureId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Feature UUID

    VersionId:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
      description: Version UUID

    Limit:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
      description: Maximum number of items to return.

    Offset:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
      description: Number of items to skip for pagination.

  responses:
    NotFound:
      description: Resource not found
      content:
        text/plain:
          schema:
            type: string
            example: 'Project not found'

    InternalError:
      description: Internal server error
      content:
        text/plain:
          schema:
            type: string

  schemas:
    # ============================================================
    # Project schemas
    # ============================================================
    Project:
      type: object
      required: [id, slug, name, key_prefix, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: URL-friendly identifier (lowercase, hyphenated). Unique across all projects.
          example: 'manifest'
        key_prefix:
          type: string
          description: Uppercase prefix for human-friendly feature IDs (e.g., "MAN" produces MAN-1, MAN-2). Auto-derived from slug, max 5 chars.
          example: 'MAN'
        name:
          type: string
          example: 'Manifest'
        description:
          type: string
          nullable: true
          example: 'Living feature documentation server'
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents (coding guidelines, conventions, etc.)
          example: 'Use Result<T,E> for errors. Follow coding-guidelines.md.'
        current_version_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the current/active version for this project
        default_feature_destination:
          type: string
          enum: [backlog, now]
          default: backlog
          description: Where new features go by default. "backlog" leaves them unassigned, "now" assigns to the current version.
        detail_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for feature sets and project context.
        ac_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for leaf feature specifications.
        ac_format:
          type: string
          enum: [checkbox, gherkin]
          default: checkbox
          description: Output format for acceptance criteria.
        testing_policy:
          type: string
          enum: [none, advisory, tdd]
          default: advisory
          description: Testing policy for the project (none, advisory, or tdd).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: 'My Project'
        slug:
          type: string
          nullable: true
          description: URL-friendly identifier. If not provided, auto-generated from name.
          example: 'my-project'
        key_prefix:
          type: string
          nullable: true
          description: Uppercase prefix for feature display IDs (max 5 chars). Auto-derived from slug if not provided.
          example: 'MYPRJ'
        description:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents

    UpdateProjectInput:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
          description: URL-friendly identifier. Must be unique.
          example: 'my-project'
        key_prefix:
          type: string
          description: Uppercase prefix for feature display IDs (max 5 chars).
          example: 'MYPRJ'
        description:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents
        current_version_id:
          type: string
          format: uuid
          nullable: true
          description: Set the current/active version for this project
        default_feature_destination:
          type: string
          enum: [backlog, now]
          description: Where new features go by default. "backlog" leaves them unassigned, "now" assigns to the current version.
        detail_level:
          type: string
          enum: [concise, standard, thorough]
          description: How detailed guidance should be for feature sets and project context.
        ac_level:
          type: string
          enum: [concise, standard, thorough]
          description: How detailed guidance should be for leaf feature specifications.
        ac_format:
          type: string
          enum: [checkbox, gherkin]
          description: Output format for acceptance criteria.
        testing_policy:
          type: string
          enum: [none, advisory, tdd]
          description: Testing policy for the project (none, advisory, or tdd).

    ProjectDirectory:
      type: object
      required: [id, project_id, path, is_primary, created_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        path:
          type: string
          example: '/Users/dev/projects/my-project'
        git_remote:
          type: string
          nullable: true
          example: 'git@github.com:org/repo.git'
        is_primary:
          type: boolean
          default: false
        instructions:
          type: string
          nullable: true
          description: Directory-specific instructions for AI agents (build commands, test commands, etc.)
          example: 'Run tests with: cargo test. Build with: cargo build --release'
        created_at:
          type: string
          format: date-time

    AddDirectoryInput:
      type: object
      required: [path]
      properties:
        path:
          type: string
          example: '/Users/dev/projects/my-project'
        git_remote:
          type: string
          nullable: true
        is_primary:
          type: boolean
          default: false
        instructions:
          type: string
          nullable: true
          description: Directory-specific instructions for AI agents

    ProjectWithDirectories:
      type: object
      required: [id, slug, name, created_at, updated_at, directories]
      properties:
        id:
          type: string
          format: uuid
        slug:
          type: string
          description: URL-friendly identifier
        name:
          type: string
        description:
          type: string
          nullable: true
        instructions:
          type: string
          nullable: true
          description: Project-wide instructions for AI agents
        current_version_id:
          type: string
          format: uuid
          nullable: true
          description: ID of the current/active version for this project
        default_feature_destination:
          type: string
          enum: [backlog, now]
          default: backlog
          description: Where new features go by default. "backlog" leaves them unassigned, "now" assigns to the current version.
        detail_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for feature sets and project context.
        ac_level:
          type: string
          enum: [concise, standard, thorough]
          default: standard
          description: How detailed guidance should be for leaf feature specifications.
        ac_format:
          type: string
          enum: [checkbox, gherkin]
          default: checkbox
          description: Output format for acceptance criteria.
        testing_policy:
          type: string
          enum: [none, advisory, tdd]
          default: advisory
          description: Testing policy for the project (none, advisory, or tdd).
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        directories:
          type: array
          items:
            $ref: '#/components/schemas/ProjectDirectory'

    # ============================================================
    # Feature schemas
    # ============================================================
    Feature:
      type: object
      required: [id, project_id, title, state, priority, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent feature ID (null for root features)
        title:
          type: string
          example: 'User Authentication'
        details:
          type: string
          nullable: true
          description: Current feature specification (what the feature IS)
        desired_details:
          type: string
          nullable: true
          description: Desired feature specification (what the feature SHOULD be). Non-null indicates pending changes.
        state:
          $ref: '#/components/schemas/FeatureState'
        priority:
          type: integer
          default: 0
          description: Priority for ordering within parent (lower values first)
        feature_number:
          type: integer
          nullable: true
          description: Per-project sequential number for display IDs (e.g., 42 in MAN-42). Assigned at creation time.
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version ID for release planning
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    FeatureState:
      type: string
      enum: [proposed, blocked, in_progress, implemented, archived]
      description: |
        - proposed: Initial state, in backlog
        - blocked: Cannot proceed until blocker features are implemented
        - in_progress: Actively being worked on
        - implemented: Feature is live in codebase
        - archived: Feature archived (soft-deleted)

    FeatureSummary:
      type: object
      description: Lightweight feature summary without details (used for list operations)
      required: [id, project_id, title, state, priority]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Parent feature ID (null for root features)
        title:
          type: string
          example: 'User Authentication'
        state:
          $ref: '#/components/schemas/FeatureState'
        priority:
          type: integer
          default: 0
          description: Priority for ordering within parent (lower values first)
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version ID for release planning

    CreateFeatureInput:
      type: object
      required: [title]
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        details:
          type: string
          nullable: true
          description: Feature specification including user stories, implementation notes, and technical context
        state:
          $ref: '#/components/schemas/FeatureState'
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version for release planning

    UpdateFeatureInput:
      type: object
      properties:
        title:
          type: string
        details:
          type: string
          nullable: true
          description: Current feature specification (what the feature IS)
        desired_details:
          type: string
          nullable: true
          description: Desired feature specification (what the feature SHOULD be). Set to plan pending changes.
        state:
          $ref: '#/components/schemas/FeatureState'
        priority:
          type: integer
          description: Priority for ordering within parent
        target_version_id:
          type: string
          format: uuid
          nullable: true
          description: Target version for release planning
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: Move feature under a different parent. Set null to make root-level.
        blocked_by:
          type: array
          items:
            type: string
            format: uuid
          description: Feature IDs that block this feature. Required when transitioning to 'blocked' state. The feature auto-transitions to 'proposed' when all blockers reach 'implemented'.

    BulkCreateFeaturesInput:
      type: object
      required: [features]
      description: Input for bulk feature creation with hierarchical structure
      properties:
        features:
          type: array
          description: The proposed feature tree to create
          items:
            $ref: '#/components/schemas/ProposedFeature'
        confirm:
          type: boolean
          default: false
          description: |
            If true, creates the features in the database.
            If false (default), returns the proposal for review without creating anything.

    ProposedFeature:
      type: object
      required: [title]
      description: A feature proposal for bulk creation, supporting hierarchical structure
      properties:
        title:
          type: string
          description: Short capability name (2-5 words). What users can DO.
          example: 'User Authentication'
        details:
          type: string
          nullable: true
          description: |
            Feature details including user stories, implementation notes, and technical context.
            User stories can use "As a [user], I can [capability] so that [benefit]" format.
        priority:
          type: integer
          default: 0
          description: Priority for ordering. Lower values = implement first.
        children:
          type: array
          default: []
          description: Child features (for hierarchical structure)
          items:
            $ref: '#/components/schemas/ProposedFeature'

    PlanFeaturesResponse:
      type: object
      required: [proposed_features, created]
      description: Response from bulk feature creation
      properties:
        proposed_features:
          type: array
          description: The proposed feature tree (same as input, for review)
          items:
            $ref: '#/components/schemas/ProposedFeature'
        created:
          type: boolean
          description: Whether the features were created (true if confirm=true was passed)
        created_feature_ids:
          type: array
          default: []
          description: UUIDs of created features (only populated if created=true)
          items:
            type: string
            format: uuid

    FeatureTreeNode:
      type: object
      description: A feature with its children recursively nested
      allOf:
        - $ref: '#/components/schemas/Feature'
        - type: object
          required: [children]
          properties:
            children:
              type: array
              items:
                $ref: '#/components/schemas/FeatureTreeNode'
            is_root:
              type: boolean
              default: false
              description: True if this is the project's root feature (contains project instructions)

    FeatureHistory:
      type: object
      required: [id, feature_id, summary, created_at]
      description: |
        Append-only log entry recording work completed on a feature.
        Similar to git log - records implementation history, not version snapshots.
      properties:
        id:
          type: string
          format: uuid
        feature_id:
          type: string
          format: uuid
        version_id:
          type: string
          format: uuid
          nullable: true
          description: Version this work was done for (captured at time of completion)
        summary:
          type: string
          description: Summary of work completed
        commits:
          type: array
          description: Git commits created during this work
          items:
            $ref: '#/components/schemas/CommitRef'
        created_at:
          type: string
          format: date-time

    ProjectHistoryEntry:
      type: object
      required:
        [id, feature_id, feature_title, feature_state, summary, created_at]
      description: |
        Project-wide history entry with feature context. Used for the unified
        project history view, where PMs can see recent changes across all features.
      properties:
        id:
          type: string
          format: uuid
        feature_id:
          type: string
          format: uuid
        feature_title:
          type: string
          description: Feature title, denormalized for display
        feature_state:
          $ref: '#/components/schemas/FeatureState'
          description: Feature state at time of query
        version_id:
          type: string
          format: uuid
          nullable: true
          description: Version this work was done for
        version_name:
          type: string
          nullable: true
          description: Version name, denormalized for display
        summary:
          type: string
          description: Summary of work completed
        commits:
          type: array
          description: Git commits created during this work
          items:
            $ref: '#/components/schemas/CommitRef'
        created_at:
          type: string
          format: date-time

    FeatureDiff:
      type: object
      required: [has_changes]
      description: |
        Diff between current and desired feature details.
        Use this to see pending changes before implementation.
      properties:
        has_changes:
          type: boolean
          description: Whether there are pending changes (desired_details differs from details)
        current:
          type: string
          nullable: true
          description: Current details (what the feature IS)
        desired:
          type: string
          nullable: true
          description: Desired details (what the feature SHOULD be)

    # ============================================================
    # History schemas
    # ============================================================
    AddHistoryInput:
      type: object
      required: [summary]
      description: Input for adding a history entry to a feature
      properties:
        summary:
          type: string
          description: Summary of work completed
        commits:
          type: array
          description: Git commits created during this work
          items:
            $ref: '#/components/schemas/CommitRef'
        version_id:
          type: string
          format: uuid
          nullable: true
          description: Version this work was done for (defaults to feature's target_version_id if not specified)

    CommitRef:
      type: object
      required: [sha, message]
      description: Reference to a git commit
      properties:
        sha:
          type: string
          description: Commit SHA (short or full)
          example: 'abc123f'
        message:
          type: string
          description: Commit message (first line)
          example: 'Add OAuth login flow'
        author:
          type: string
          nullable: true
          description: Commit author (if different from default)

    # ============================================================
    # Version schemas
    # ============================================================
    Version:
      type: object
      required: [id, project_id, name, created_at, updated_at]
      description: A version for release planning
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        name:
          type: string
          description: Version name (e.g., "1.0.0", "2.0.0-beta")
          example: '1.0.0'
        description:
          type: string
          nullable: true
          description: Optional description of the version
        released_at:
          type: string
          format: date-time
          nullable: true
          description: When this version was released (if released)
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateVersionInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          description: Version name (e.g., "1.0.0", "2.0.0-beta")
        description:
          type: string
          nullable: true
          description: Optional description of the version

    UpdateVersionInput:
      type: object
      properties:
        name:
          type: string
          description: Version name
        description:
          type: string
          nullable: true
          description: Optional description of the version
        released_at:
          type: string
          format: date-time
          nullable: true
          description: Set to mark the version as released

    # ============================================================
    # Filesystem schemas
    # ============================================================
    BrowseResponse:
      type: object
      required: [path, entries]
      description: Directory listing for the filesystem browser
      properties:
        path:
          type: string
          description: The absolute path being browsed
          example: '/Users/dev/projects'
        parent:
          type: string
          nullable: true
          description: Parent directory path, or null if at filesystem root
          example: '/Users/dev'
        entries:
          type: array
          description: Subdirectories at this path
          items:
            $ref: '#/components/schemas/DirectoryEntry'

    DirectoryEntry:
      type: object
      required: [name, path, has_children]
      description: A subdirectory entry in the filesystem browser
      properties:
        name:
          type: string
          description: Directory name
          example: 'my-project'
        path:
          type: string
          description: Full absolute path
          example: '/Users/dev/projects/my-project'
        has_children:
          type: boolean
          description: Whether this directory contains visible subdirectories

    MkdirRequest:
      type: object
      required: [path]
      description: Request to create a directory
      properties:
        path:
          type: string
          description: Absolute path of the directory to create
          example: '/Users/dev/projects/my-new-app'

    MkdirResponse:
      type: object
      required: [path]
      description: Result of creating a directory
      properties:
        path:
          type: string
          description: The absolute path that was created
          example: '/Users/dev/projects/my-new-app'

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          description: Error message
          example: 'Path must be absolute'

    # ============================================================
    # Portfolio schemas
    # ============================================================

    PortfolioFeatureRef:
      type: object
      required: [id, title]
      description: A minimal feature reference used in portfolio lanes.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string

    PortfolioVersionSummary:
      type: object
      required: [id, name, feature_count, implemented_count]
      description: Version progress summary for the portfolio lane header.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: 'v0.2.0'
        feature_count:
          type: integer
          description: Total leaf features assigned to this version.
        implemented_count:
          type: integer
          description: Leaf features in this version with state `implemented`.

    PortfolioNextFeature:
      type: object
      required: [id, title, in_version]
      description: The single next actionable feature for a project.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        in_version:
          type: boolean
          description: Whether this feature is assigned to the next version (vs backlog).

    PortfolioCompletion:
      type: object
      required: [id, title, completed_at]
      description: A recent feature completion for the activity section.
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        completed_at:
          type: string
          format: date-time

    PortfolioProject:
      type: object
      required: [id, name, slug, in_progress, in_progress_total, blocked, blocked_count, recent_completions]
      description: Aggregated health snapshot for a single project in the portfolio view.
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        next_version:
          $ref: '#/components/schemas/PortfolioVersionSummary'
          nullable: true
        next_feature:
          $ref: '#/components/schemas/PortfolioNextFeature'
          nullable: true
        in_progress:
          type: array
          description: Up to 5 in-progress leaf features.
          items:
            $ref: '#/components/schemas/PortfolioFeatureRef'
        in_progress_total:
          type: integer
          description: Total count of in-progress leaf features (may exceed in_progress.length).
        blocked:
          type: array
          description: All blocked leaf features.
          items:
            $ref: '#/components/schemas/PortfolioFeatureRef'
        blocked_count:
          type: integer
          description: Total count of blocked leaf features.
        recent_completions:
          type: array
          description: Up to 5 features completed in the last 7 days, newest-first.
          items:
            $ref: '#/components/schemas/PortfolioCompletion'
        last_activity_at:
          type: string
          format: date-time
          nullable: true
          description: Timestamp of the most recent completion (for stalled detection).

    Portfolio:
      type: object
      required: [projects]
      description: Full portfolio response — health snapshots for all projects.
      properties:
        projects:
          type: array
          items:
            $ref: '#/components/schemas/PortfolioProject'

    # ============================================================
    # Claim & Complete schemas
    # ============================================================
    ClaimFeatureInput:
      type: object
      required: [agent_type]
      properties:
        agent_type:
          type: string
          description: Agent type claiming this feature (e.g. 'claude', 'gemini', 'codex', 'copilot').
          example: 'claude'
        metadata:
          type: string
          nullable: true
          description: Optional JSON metadata about the agent's execution context.
          example: '{"branch":"feature/auth"}'
        force:
          type: boolean
          default: false
          description: Force claim even if another agent holds it.

    ClaimConflictError:
      type: object
      required: [error, message, conflict]
      description: Returned when a feature is already claimed by another agent.
      properties:
        error:
          type: string
          enum: [claim_conflict]
        message:
          type: string
          example: "Feature already claimed by 'claude'"
        conflict:
          type: object
          required: [agent_type, feature_id, claimed_at]
          properties:
            agent_type:
              type: string
              description: The agent type that currently owns the claim.
              example: 'claude'
            feature_id:
              type: string
              format: uuid
              description: The feature ID that is already claimed.
            claimed_at:
              type: string
              format: date-time
              description: When the existing claim was established.
            claim_metadata:
              type: string
              nullable: true
              description: Optional metadata from the existing claim.

    CompleteFeatureInput:
      type: object
      required: [summary]
      properties:
        summary:
          type: string
          description: Summary of work done.
        commits:
          type: array
          default: []
          items:
            type: object
            required: [sha, message]
            properties:
              sha:
                type: string
              message:
                type: string
              author:
                type: string
                nullable: true

    CompleteFeatureResponse:
      type: object
      required: [feature, history]
      properties:
        feature:
          $ref: '#/components/schemas/Feature'
        history:
          $ref: '#/components/schemas/FeatureHistory'

    # ============================================================
    # Feature context schemas
    # ============================================================
    FeatureWithContext:
      type: object
      description: A feature with its hierarchical navigation context.
      required: [id, project_id, title, state, priority, siblings, children, breadcrumb, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        parent_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
        details:
          type: string
          nullable: true
        desired_details:
          type: string
          nullable: true
        details_summary:
          type: string
          nullable: true
        state:
          $ref: '#/components/schemas/FeatureState'
        priority:
          type: integer
        feature_number:
          type: integer
          nullable: true
        target_version_id:
          type: string
          format: uuid
          nullable: true
        parent:
          $ref: '#/components/schemas/FeatureSummaryContext'
          nullable: true
        siblings:
          type: array
          items:
            $ref: '#/components/schemas/FeatureSummaryContext'
        children:
          type: array
          items:
            $ref: '#/components/schemas/FeatureSummaryContext'
        breadcrumb:
          type: array
          items:
            $ref: '#/components/schemas/BreadcrumbItem'
        latest_proof:
          $ref: '#/components/schemas/Proof'
          nullable: true
          description: Most recent proof (test evidence) for this feature.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Proof:
      type: object
      required: [id, feature_id, command, exit_code, created_at]
      description: Test evidence record for a feature.
      properties:
        id:
          type: string
          format: uuid
        feature_id:
          type: string
          format: uuid
        history_id:
          type: string
          format: uuid
          nullable: true
          description: Optional link to a feature_history entry.
        command:
          type: string
          description: The test command that was run (e.g., "cargo test auth_spec").
        exit_code:
          type: integer
          description: Process exit code (0 = all tests passed).
        output:
          type: string
          nullable: true
          description: Raw stdout/stderr output, capped at 10K characters.
        tests:
          type: array
          nullable: true
          description: Structured test results for consistent rendering.
          items:
            $ref: '#/components/schemas/TestResult'
        evidence:
          type: array
          description: Evidence file paths linked to this proof.
          items:
            $ref: '#/components/schemas/Evidence'
        commit_sha:
          type: string
          nullable: true
          description: Git commit SHA at the time of proving.
        agent_type:
          type: string
          nullable: true
          description: Agent that produced the proof (e.g., "claude", "human").
        created_at:
          type: string
          format: date-time

    TestResult:
      type: object
      required: [name, state]
      description: A single test result within a proof.
      properties:
        name:
          type: string
          description: Name of the test.
        suite:
          type: string
          nullable: true
          description: Test suite or module name.
        state:
          type: string
          enum: [passed, failed, errored, skipped]
          description: Result state.
        file:
          type: string
          nullable: true
          description: Source file path (relative to project root).
        line:
          type: integer
          nullable: true
          description: Line number in the source file.
        duration_ms:
          type: integer
          nullable: true
          description: Duration in milliseconds.
        message:
          type: string
          nullable: true
          description: Failure or error message.

    Evidence:
      type: object
      required: [path]
      description: A file path linked as evidence for a proof.
      properties:
        path:
          type: string
          description: File path (relative to project root).
        note:
          type: string
          nullable: true
          description: Optional note about why this file is evidence.

    FeatureSummaryContext:
      type: object
      required: [id, title, state]
      description: Lightweight feature summary for context (parent, siblings, children).
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        state:
          $ref: '#/components/schemas/FeatureState'

    BreadcrumbItem:
      type: object
      required: [id, title]
      description: Breadcrumb item for navigation path (root to feature).
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        details:
          type: string
          nullable: true
          description: Contextual details from this ancestor.

    # ============================================================
    # Verification schemas
    # ============================================================
    VerifyFeatureContextResponse:
      type: object
      required: [spec, diff_truncated, instructions]
      description: Assembled context for feature verification.
      properties:
        spec:
          type: string
          description: Feature specification + breadcrumb context formatted as markdown.
        diff:
          type: string
          nullable: true
          description: Filtered implementation diff.
        diff_truncated:
          type: boolean
          description: True if the diff was truncated due to size limit.
        instructions:
          type: string
          description: Instruction text for the calling agent.

    VerificationComment:
      type: object
      required: [severity, title, body]
      description: A single comment from implementation verification.
      properties:
        severity:
          type: string
          enum: [critical, major, minor]
          description: "critical: core requirement missing. major: significant gap. minor: style drift."
        title:
          type: string
          description: One-line summary of the gap.
        body:
          type: string
          description: Actionable explanation with suggested fix.
        file:
          type: string
          nullable: true
          description: Affected file path if the gap is localized.

    # ============================================================
    # Memory schemas
    # ============================================================
    ProjectMemory:
      type: object
      required: [id, project_id, content, tags, created_by, created_at, updated_at]
      description: A project memory entry for AI agent recall.
      properties:
        id:
          type: string
          format: uuid
        project_id:
          type: string
          format: uuid
        content:
          type: string
          description: Plain text or markdown content.
        tags:
          type: array
          items:
            type: string
          description: Tags for categorisation.
        source_feature_id:
          type: string
          format: uuid
          nullable: true
          description: Feature this memory originated from.
        created_by:
          type: string
          description: "Who created this: 'agent' or 'human'."
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateMemoryInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
          description: Plain text or markdown content to remember.
        tags:
          type: array
          default: []
          items:
            type: string
          description: Tags for categorisation.
        source_feature_id:
          type: string
          format: uuid
          nullable: true
          description: Feature this memory is associated with.
        created_by:
          type: string
          default: 'agent'
          description: "Who created this: 'agent' or 'human'."

    # ============================================================
    # Analysis schemas
    # ============================================================
    ProjectAnalysis:
      type: object
      description: Analysis results for a codebase directory.
      properties:
        name:
          type: string
          nullable: true
          description: Detected project name.
        description:
          type: string
          nullable: true
          description: Detected project description.
        project_type:
          type: object
          properties:
            language:
              type: string
            frameworks:
              type: array
              items:
                type: string
            build_tool:
              type: string
              nullable: true
        git_remote:
          type: string
          nullable: true
        directories:
          type: array
          items:
            type: object
            properties:
              path:
                type: string
              kind:
                type: string
              file_count:
                type: integer
        modules:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              path:
                type: string
              is_major:
                type: boolean
        documentation:
          type: object
          nullable: true
          properties:
            readme:
              type: string
              nullable: true
            claude_md:
              type: string
              nullable: true
        hints:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
              reason:
                type: string
              paths:
                type: array
                items:
                  type: string
